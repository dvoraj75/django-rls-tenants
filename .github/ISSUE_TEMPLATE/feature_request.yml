name: Feature Request
description: Suggest a new feature or enhancement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for suggesting a feature. Please describe the problem you are trying
        to solve and the solution you have in mind.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this feature solve? What is your use case?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the solution you would like to see.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternative approaches you have considered.

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other context, examples, or references.
