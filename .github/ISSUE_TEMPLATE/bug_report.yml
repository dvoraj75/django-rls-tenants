name: Bug Report
description: Report a bug in django-rls-tenants
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug. Please fill out the sections below so we can
        reproduce and fix the issue.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Minimal steps to reproduce the behavior.
      placeholder: |
        1. Configure RLS_TENANTS with ...
        2. Create a model ...
        3. Run query ...
        4. See error ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened. Include tracebacks if applicable.
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      description: django-rls-tenants version (run `pip show django-rls-tenants`).
      placeholder: "0.1.0"
    validations:
      required: true

  - type: input
    id: django-version
    attributes:
      label: Django Version
      placeholder: "5.1"
    validations:
      required: true

  - type: input
    id: pg-version
    attributes:
      label: PostgreSQL Version
      placeholder: "16.2"
    validations:
      required: true

  - type: input
    id: python-version
    attributes:
      label: Python Version
      placeholder: "3.12"
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other context (connection pooling setup, async usage, etc.).
