name: PR Policy

on:
  pull_request_target:
    types: [opened, edited, reopened]

permissions:
  pull-requests: write

jobs:
  check-target-branch:
    name: Check target branch
    runs-on: ubuntu-latest
    if: github.event.pull_request.base.ref != 'develop' && github.actor != github.repository_owner
    steps:
      - name: Comment and close PR
        env:
          TARGET_BRANCH: ${{ github.event.pull_request.base.ref }}
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const pr_number = context.payload.pull_request.number;
            const targetBranch = process.env.TARGET_BRANCH;

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: pr_number,
              body: `Thanks for your contribution! However, all PRs must target the \`develop\` branch, not \`${targetBranch}\`.\n\nPlease close this PR and reopen it against \`develop\`.`
            });

            await github.rest.pulls.update({
              owner,
              repo,
              pull_number: pr_number,
              state: 'closed'
            });

  check-issue-link:
    name: Check issue linkage
    runs-on: ubuntu-latest
    steps:
      - name: Verify PR references an issue
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        uses: actions/github-script@v7
        with:
          script: |
            const body = process.env.PR_BODY || '';

            const patterns = [
              /(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?)\s+#\d+/i,
              /(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?)\s+https:\/\/github\.com\/[^/]+\/[^/]+\/issues\/\d+/i,
              /#\d+/
            ];

            const hasIssueRef = patterns.some(p => p.test(body));

            if (!hasIssueRef) {
              core.setFailed(
                'PR must reference an issue. Use "Closes #123" or include an issue number (#123) in the PR description.'
              );
            }
