<!DOCTYPE html>
<html>
<head>
    <title>django-rls-tenants Demo</title>
    <style>
        body { font-family: system-ui, sans-serif; max-width: 800px; margin: 2rem auto; padding: 0 1rem; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #009688; padding-bottom: 1rem; margin-bottom: 2rem; }
        .tenant-badge { background: #009688; color: white; padding: 0.25rem 0.75rem; border-radius: 4px; font-size: 0.875rem; }
        .btn { background: #009688; color: white; border: none; padding: 0.5rem 1rem; border-radius: 4px; cursor: pointer; text-decoration: none; font-size: 0.875rem; }
        .btn-danger { background: #d32f2f; }
        .note { border: 1px solid #e0e0e0; border-radius: 8px; padding: 1rem; margin-bottom: 1rem; }
        .note h3 { margin: 0 0 0.5rem; }
        .note .meta { color: #757575; font-size: 0.875rem; }
        input, textarea { width: 100%; padding: 0.5rem; margin-bottom: 1rem; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .empty { text-align: center; color: #757575; padding: 3rem; }
    </style>
</head>
<body>
    <div class="header">
        <h1>Notes</h1>
        <div>
            {% if user.is_authenticated %}
                <span class="tenant-badge">
                    {% if user.tenant %}{{ user.tenant.name }}{% else %}Admin{% endif %}
                </span>
                {{ user.email }}
                <a href="{% url 'logout' %}" class="btn">Log out</a>
            {% endif %}
        </div>
    </div>
    {% block content %}{% endblock %}
</body>
</html>
